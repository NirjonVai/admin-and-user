<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Bet - BetX Admin</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col md:flex-row font-['Plus_Jakarta_Sans']">

  <!-- Mobile Overlay Backdrop -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"></div>

  <!-- Sidebar Component -->
  <aside id="sidebar" class="w-64 bg-gray-900 text-white min-h-screen flex flex-col justify-between p-4 fixed left-0 top-0 bottom-0 z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
    <div>
      <!-- Logo / Title & Close Button for Mobile -->
      <div class="flex items-center justify-between px-3 py-4 mb-6 border-b border-gray-800">
        <div class="flex items-center space-x-3">
          <i class="fa-solid fa-user-shield text-orange-500 text-2xl"></i>
          <span class="text-xl font-bold tracking-wide">BetX Admin</span>
        </div>
        <button id="sidebar-close-btn" class="md:hidden text-gray-400 hover:text-white p-1">
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
      </div>

      <!-- Navigation Links -->
      <nav class="space-y-1">
        <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 text-sm font-semibold text-gray-300 rounded-xl hover:bg-gray-800 hover:text-white transition">
          <i class="fa-solid fa-chart-pie text-lg text-gray-400"></i>
          <span>Dashboard</span>
        </a>
        <a href="users.html" class="flex items-center gap-3 px-4 py-3 text-sm font-semibold text-gray-300 rounded-xl hover:bg-gray-800 hover:text-white transition">
          <i class="fa-solid fa-users text-lg text-gray-400"></i>
          <span>User</span>
        </a>
        <!-- Active Menu -->
        <a href="add-bet.html" class="flex items-center gap-3 px-4 py-3 text-sm font-semibold bg-orange-500 text-white rounded-xl shadow-lg shadow-orange-500/20 transition">
          <i class="fa-solid fa-plus-circle text-lg"></i>
          <span>Add Bet</span>
        </a>
        <a href="live-bet.html" class="flex items-center gap-3 px-4 py-3 text-sm font-semibold text-gray-300 rounded-xl hover:bg-gray-800 hover:text-white transition">
          <i class="fa-solid fa-tower-broadcast text-lg text-gray-400"></i>
          <span>Live Bet</span>
        </a>
        <a href="bet-history.html" class="flex items-center gap-3 px-4 py-3 text-sm font-semibold text-gray-300 rounded-xl hover:bg-gray-800 hover:text-white transition">
          <i class="fa-solid fa-clock-rotate-left text-lg text-gray-400"></i>
          <span>Bet History</span>
        </a>
      </nav>
    </div>

    <!-- Bottom Logout Section -->
    <div class="pt-4 border-t border-gray-800">
      <button 
        id="logout-btn" 
        class="w-full bg-red-600/10 hover:bg-red-600 text-red-500 hover:text-white text-sm font-semibold px-4 py-3 rounded-xl transition flex items-center gap-3"
      >
        <i class="fa-solid fa-right-from-bracket text-lg"></i> Logout
      </button>
    </div>
  </aside>

  <!-- Main Content Wrapper -->
  <div class="flex-1 md:ml-64 flex flex-col min-h-screen">

    <!-- Top Header -->
    <header class="bg-white border-b border-gray-200 px-6 md:px-8 py-4 flex justify-between items-center shadow-sm sticky top-0 z-20">
      <div class="flex items-center gap-3">
        <!-- Sidebar Open (Hamburger) Button for Mobile -->
        <button id="sidebar-open-btn" class="md:hidden text-gray-700 hover:text-orange-500 text-xl p-1 focus:outline-none">
          <i class="fa-solid fa-bars"></i>
        </button>
        <h1 class="text-lg md:text-xl font-bold text-gray-800">Add New Match / Bet</h1>
      </div>
      <div class="flex items-center gap-4">
        <span id="admin-status" class="text-xs bg-orange-500/10 text-orange-500 px-3 py-1.5 rounded-full border border-orange-500/20 font-semibold">
          <i class="fa-solid fa-circle text-[8px] mr-1 text-orange-500"></i> Admin Active
        </span>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 p-4 md:p-8 max-w-4xl w-full mx-auto">
      
      <!-- Add Bet Form Card -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="p-6 border-b border-gray-100">
          <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
            <i class="fa-solid fa-calendar-plus text-orange-500"></i> Match Details
          </h2>
          <p class="text-xs text-gray-500 mt-1">Fill in the details to create a new betting event.</p>
        </div>

        <form id="add-bet-form" class="p-6 space-y-6">
          
          <!-- Row 1: Sport, Match Type & League -->
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-2 uppercase tracking-wide">Select Sport</label>
              <div class="relative">
                <select id="sport-type" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:outline-none appearance-none font-medium text-gray-700">
                  <option value="" disabled selected>Choose a sport...</option>
                  <option value="Cricket">🏏 Cricket</option>
                  <option value="Football">⚽ Football</option>
                </select>
                <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 pointer-events-none"></i>
              </div>
            </div>

            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-2 uppercase tracking-wide">Match Category</label>
              <div class="relative">
                <select id="match-category" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:outline-none appearance-none font-medium text-gray-700">
                  <option value="" disabled selected>Select category...</option>
                  <option value="Real Match">🏟️ Real Match</option>
                  <option value="AI Match">🤖 AI Match</option>
                </select>
                <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 pointer-events-none"></i>
              </div>
            </div>
            
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-2 uppercase tracking-wide">League Title</label>
              <input type="text" id="league-title" placeholder="e.g. IPL 2024, Premier League" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:outline-none font-medium text-gray-700">
            </div>
          </div>

          <hr class="border-gray-100">

          <!-- Row 2: Team 1 Details -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-2 uppercase tracking-wide">Team 1 Name</label>
              <input type="text" id="team1-name" placeholder="e.g. Chennai Super Kings" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:outline-none font-medium text-gray-700">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-2 uppercase tracking-wide">Team 1 Logo (URL)</label>
              <input type="url" id="team1-logo" placeholder="https://example.com/logo1.png" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:outline-none font-medium text-gray-700">
            </div>
          </div>

          <!-- Row 3: Team 2 Details -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-2 uppercase tracking-wide">Team 2 Name</label>
              <input type="text" id="team2-name" placeholder="e.g. Mumbai Indians" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:outline-none font-medium text-gray-700">
            </div>
            <div>
              <label class="block text-xs font-semibold text-gray-600 mb-2 uppercase tracking-wide">Team 2 Logo (URL)</label>
              <input type="url" id="team2-logo" placeholder="https://example.com/logo2.png" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:outline-none font-medium text-gray-700">
            </div>
          </div>

          <hr class="border-gray-100">

          <!-- Row 4: Date and Time -->
          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-2 uppercase tracking-wide">Match Date & Time</label>
            <input type="datetime-local" id="match-datetime" required class="w-full md:w-1/2 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:outline-none font-medium text-gray-700">
          </div>

          <!-- Submit Button -->
          <div class="pt-4 flex justify-end">
            <button type="submit" id="submit-btn" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg shadow-orange-500/30 transition flex items-center gap-2">
              <i class="fa-solid fa-check"></i> Add Match to Live
            </button>
          </div>

        </form>
      </div>

    </main>
  </div>

  <!-- Firebase & UI Scripts -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, get, child, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyBzQaaXhTtiGpMjRMBUXZaCIrDRoNyEkU4",
      authDomain: "betx-904da.firebaseapp.com",
      databaseURL: "https://betx-904da-default-rtdb.firebaseio.com",
      projectId: "betx-904da",
      storageBucket: "betx-904da.firebasestorage.app",
      messagingSenderId: "1076536561200",
      appId: "1:1076536561200:web:87ddeee59d73ed3a08e7f5",
      measurementId: "G-ER5HGVL74K"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // Sidebar & Mobile Controls
    const sidebar = document.getElementById('sidebar');
    const sidebarOpenBtn = document.getElementById('sidebar-open-btn');
    const sidebarCloseBtn = document.getElementById('sidebar-close-btn');
    const sidebarOverlay = document.getElementById('sidebar-overlay');

    const toggleSidebar = () => {
      sidebar.classList.toggle('-translate-x-full');
      sidebarOverlay.classList.toggle('hidden');
    };

    sidebarOpenBtn.addEventListener('click', toggleSidebar);
    sidebarCloseBtn.addEventListener('click', toggleSidebar);
    sidebarOverlay.addEventListener('click', toggleSidebar);

    const logoutBtn = document.getElementById('logout-btn');
    const addBetForm = document.getElementById('add-bet-form');
    const submitBtn = document.getElementById('submit-btn');

    // Handle Form Submission
    addBetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Button loading state
      const originalBtnText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Adding...';
      submitBtn.disabled = true;

      // Get values
      const sportType = document.getElementById('sport-type').value;
      const matchCategory = document.getElementById('match-category').value;
      const leagueTitle = document.getElementById('league-title').value.trim();
      const team1Name = document.getElementById('team1-name').value.trim();
      const team1Logo = document.getElementById('team1-logo').value.trim();
      const team2Name = document.getElementById('team2-name').value.trim();
      const team2Logo = document.getElementById('team2-logo').value.trim();
      const matchDatetime = document.getElementById('match-datetime').value;

      try {
        // Create new bet reference in Firebase under "bets" node
        const betsRef = ref(db, 'bets');
        const newBetRef = push(betsRef);

        await set(newBetRef, {
          sport: sportType,
          category: matchCategory, // Real Match or AI Match
          league: leagueTitle,
          team1: {
            name: team1Name,
            logo: team1Logo
          },
          team2: {
            name: team2Name,
            logo: team2Logo
          },
          matchDate: matchDatetime,
          status: 'upcoming', // Default status
          createdAt: new Date().toISOString()
        });

        alert('Match added successfully!');
        addBetForm.reset();
      } catch (error) {
        console.error("Error adding match:", error);
        alert('Failed to add match: ' + error.message);
      } finally {
        submitBtn.innerHTML = originalBtnText;
        submitBtn.disabled = false;
      }
    });

    // Auth & Admin Check
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        try {
          const dbRef = ref(db);
          const userSnapshot = await get(child(dbRef, `users/${user.uid}`));

          if (!userSnapshot.exists() || userSnapshot.val().role !== "admin") {
            alert("Access Denied! You do not have admin permissions.");
            window.location.href = "5.html"; // Replace with your normal user index page
          }
        } catch (err) {
          window.location.href = "login.html";
        }
      } else {
        window.location.href = "login.html";
      }
    });

    // Logout Functionality
    logoutBtn.addEventListener('click', () => {
      signOut(auth).then(() => {
        window.location.href = "login.html";
      });
    });
  </script>

</body>
    </html>
