<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - BetX</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col font-['Plus_Jakarta_Sans']">

  <!-- Navbar -->
  <nav class="bg-gray-900 text-white px-6 py-4 flex justify-between items-center shadow-md">
    <div class="flex items-center space-x-2">
      <i class="fa-solid fa-user-shield text-orange-500 text-2xl"></i>
      <span class="text-xl font-bold">BetX Admin Panel</span>
    </div>
    <div class="flex items-center gap-4">
      <span id="admin-status" class="text-xs bg-orange-500/20 text-orange-400 px-3 py-1 rounded-full border border-orange-500/30 font-semibold">Admin Active</span>
      <button 
        id="logout-btn" 
        class="bg-red-600 hover:bg-red-700 text-white text-xs font-semibold px-3 py-2 rounded-lg transition flex items-center gap-2"
      >
        <i class="fa-solid fa-right-from-bracket"></i> Logout
      </button>
    </div>
  </nav>

  <!-- Main Content Area -->
  <main class="flex-1 p-6 max-w-6xl mx-auto w-full">
    
    <!-- Top Stats Bar -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 flex items-center justify-between">
        <div>
          <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Total Users</p>
          <h3 id="total-users" class="text-3xl font-extrabold text-gray-800 mt-1">0</h3>
        </div>
        <div class="bg-orange-100 text-orange-500 p-4 rounded-xl">
          <i class="fa-solid fa-users text-2xl"></i>
        </div>
      </div>
    </div>

    <!-- Users Table Section -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="p-6 border-b border-gray-100 flex justify-between items-center">
        <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
          <i class="fa-solid fa-list text-orange-500"></i> Registered Users List
        </h2>
        <button id="refresh-btn" class="text-sm text-orange-500 hover:text-orange-600 font-semibold flex items-center gap-1">
          <i class="fa-solid fa-rotate-right"></i> Refresh
        </button>
      </div>

      <!-- Table -->
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-gray-50 text-gray-600 text-xs font-semibold uppercase border-b border-gray-100">
              <th class="py-4 px-6">User ID</th>
              <th class="py-4 px-6">Username</th>
              <th class="py-4 px-6">Email</th>
              <th class="py-4 px-6">Role</th>
              <th class="py-4 px-6">Created At</th>
              <th class="py-4 px-6 text-center">Action</th>
            </tr>
          </thead>
          <tbody id="user-table-body" class="divide-y divide-gray-100 text-sm text-gray-700">
            <tr>
              <td colspan="6" class="py-6 text-center text-gray-400">Loading user data...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <!-- Edit User Modal (Popup Box) -->
  <div id="edit-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl border border-gray-200">
      <div class="flex justify-between items-center mb-4 pb-2 border-b border-gray-100">
        <h3 class="text-lg font-bold text-gray-800">Edit User Details</h3>
        <button id="close-modal-btn" class="text-gray-400 hover:text-gray-600">
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
      </div>
      
      <form id="edit-form" class="space-y-4">
        <input type="hidden" id="edit-uid">
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Username</label>
          <input type="text" id="edit-username" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:outline-none">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Email</label>
          <input type="email" id="edit-email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:outline-none">
        </div>
        <div class="flex justify-end gap-3 pt-2">
          <button type="button" id="cancel-modal-btn" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm font-semibold hover:bg-gray-300">Cancel</button>
          <button type="submit" class="px-4 py-2 bg-orange-500 text-white rounded-lg text-sm font-semibold hover:bg-orange-600">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Firebase Script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, get, child, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyBzQaaXhTtiGpMjRMBUXZaCIrDRoNyEkU4",
      authDomain: "betx-904da.firebaseapp.com",
      databaseURL: "https://betx-904da-default-rtdb.firebaseio.com",
      projectId: "betx-904da",
      storageBucket: "betx-904da.firebasestorage.app",
      messagingSenderId: "1076536561200",
      appId: "1:1076536561200:web:87ddeee59d73ed3a08e7f5",
      measurementId: "G-ER5HGVL74K"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const userTableBody = document.getElementById('user-table-body');
    const totalUsersElem = document.getElementById('total-users');
    const refreshBtn = document.getElementById('refresh-btn');
    const logoutBtn = document.getElementById('logout-btn');

    // Modal elements
    const editModal = document.getElementById('edit-modal');
    const editUidInput = document.getElementById('edit-uid');
    const editUsernameInput = document.getElementById('edit-username');
    const editEmailInput = document.getElementById('edit-email');
    const editForm = document.getElementById('edit-form');
    const closeModalBtn = document.getElementById('close-modal-btn');
    const cancelModalBtn = document.getElementById('cancel-modal-btn');

    // Load Users Data
    async function loadUsers() {
      userTableBody.innerHTML = `
        <tr>
          <td colspan="6" class="py-6 text-center text-gray-400">Loading user data...</td>
        </tr>
      `;

      try {
        const usersRef = ref(db, 'users');
        const snapshot = await get(usersRef);

        if (snapshot.exists()) {
          const usersData = snapshot.val();
          const userKeys = Object.keys(usersData);

          totalUsersElem.innerText = userKeys.length;
          userTableBody.innerHTML = "";

          userKeys.forEach((uid) => {
            const user = usersData[uid];
            const roleBadge = user.role === 'admin' 
              ? `<span class="bg-orange-100 text-orange-600 text-xs px-2.5 py-1 rounded-full font-bold">Admin</span>`
              : `<span class="bg-gray-100 text-gray-600 text-xs px-2.5 py-1 rounded-full">User</span>`;

            const row = `
              <tr class="hover:bg-gray-50 transition">
                <td class="py-4 px-6 font-mono text-xs text-gray-400">${uid.substring(0, 8)}...</td>
                <td class="py-4 px-6 font-semibold text-gray-800">${user.username || 'N/A'}</td>
                <td class="py-4 px-6">${user.email || 'N/A'}</td>
                <td class="py-4 px-6">${roleBadge}</td>
                <td class="py-4 px-6 text-xs text-gray-500">${user.createdAt || 'N/A'}</td>
                <td class="py-4 px-6 text-center">
                  <button 
                    onclick="openEditModal('${uid}', '${user.username || ''}', '${user.email || ''}')" 
                    class="bg-blue-50 hover:bg-blue-100 text-blue-600 text-xs px-3 py-1.5 rounded-lg font-semibold transition"
                  >
                    <i class="fa-solid fa-pen-to-square"></i> Edit
                  </button>
                </td>
              </tr>
            `;
            userTableBody.innerHTML += row;
          });

        } else {
          totalUsersElem.innerText = "0";
          userTableBody.innerHTML = `
            <tr>
              <td colspan="6" class="py-6 text-center text-gray-400">No users found!</td>
            </tr>
          `;
        }
      } catch (error) {
        console.error("Error loading users:", error);
        userTableBody.innerHTML = `
          <tr>
            <td colspan="6" class="py-6 text-center text-red-500">Error: ${error.message}</td>
          </tr>
        `;
      }
    }

    // Open Modal Window Function
    window.openEditModal = (uid, username, email) => {
      editUidInput.value = uid;
      editUsernameInput.value = username;
      editEmailInput.value = email;
      editModal.classList.remove('hidden');
      editModal.classList.add('flex');
    };

    // Close Modal Function
    const closeModal = () => {
      editModal.classList.add('hidden');
      editModal.classList.remove('flex');
    };

    closeModalBtn.addEventListener('click', closeModal);
    cancelModalBtn.addEventListener('click', closeModal);

    // Save Updated Data to Firebase
    editForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const uid = editUidInput.value;
      const newUsername = editUsernameInput.value;
      const newEmail = editEmailInput.value;

      try {
        await update(ref(db, 'users/' + uid), {
          username: newUsername,
          email: newEmail
        });
        
        closeModal();
        loadUsers(); // Refresh table
        alert('User details updated successfully!');
      } catch (err) {
        alert('Failed to update: ' + err.message);
      }
    });

    // Auth & Admin Check
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        try {
          const dbRef = ref(db);
          const userSnapshot = await get(child(dbRef, `users/${user.uid}`));

          if (userSnapshot.exists() && userSnapshot.val().role === "admin") {
            loadUsers();
          } else {
            alert("Access Denied! You do not have admin permissions.");
            window.location.href = "5.html";
          }
        } catch (err) {
          window.location.href = "login.html";
        }
      } else {
        window.location.href = "login.html";
      }
    });

    refreshBtn.addEventListener('click', loadUsers);

    logoutBtn.addEventListener('click', () => {
      signOut(auth).then(() => {
        window.location.href = "login.html";
      });
    });
  </script>

</body>
</html>
