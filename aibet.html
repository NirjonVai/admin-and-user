<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Match - BetX Admin</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body class="bg-gray-100 min-h-screen flex flex-col md:flex-row font-['Plus_Jakarta_Sans']">

  <!-- Mobile Overlay Backdrop -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"></div>

  <!-- Sidebar Component -->
  <aside id="sidebar" class="w-64 bg-gray-900 text-white min-h-screen flex flex-col justify-between p-4 fixed left-0 top-0 bottom-0 z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
    <div>
      <div class="flex items-center justify-between px-3 py-4 mb-6 border-b border-gray-800">
        <div class="flex items-center space-x-3">
          <i class="fa-solid fa-user-shield text-orange-500 text-2xl"></i>
          <span class="text-xl font-bold tracking-wide">BetX Admin</span>
        </div>
        <button id="sidebar-close-btn" class="md:hidden text-gray-400 hover:text-white p-1">
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
      </div>

      <!-- Navigation Links -->
      <nav class="space-y-1">
        <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 text-sm font-semibold text-gray-300 rounded-xl hover:bg-gray-800 hover:text-white transition">
          <i class="fa-solid fa-chart-pie text-lg text-gray-400"></i>
          <span>Dashboard</span>
        </a>
        <a href="users.html" class="flex items-center gap-3 px-4 py-3 text-sm font-semibold text-gray-300 rounded-xl hover:bg-gray-800 hover:text-white transition">
          <i class="fa-solid fa-users text-lg text-gray-400"></i>
          <span>User</span>
        </a>
        <a href="add-bet.html" class="flex items-center gap-3 px-4 py-3 text-sm font-semibold text-gray-300 rounded-xl hover:bg-gray-800 hover:text-white transition">
          <i class="fa-solid fa-plus-circle text-lg text-gray-400"></i>
          <span>Add Bet</span>
        </a>
        <!-- Real Bet Menu -->
        <a href="live-bet.html" class="flex items-center gap-3 px-4 py-3 text-sm font-semibold text-gray-300 rounded-xl hover:bg-gray-800 hover:text-white transition">
          <i class="fa-solid fa-trophy text-lg text-gray-400"></i>
          <span>Real Match</span>
        </a>
        <!-- Active AI Bet Menu -->
        <a href="ai-bet.html" class="flex items-center gap-3 px-4 py-3 text-sm font-semibold bg-purple-600 text-white rounded-xl shadow-lg shadow-purple-600/20 transition">
          <i class="fa-solid fa-robot text-lg"></i>
          <span>AI Match</span>
        </a>
        <a href="bet-history.html" class="flex items-center gap-3 px-4 py-3 text-sm font-semibold text-gray-300 rounded-xl hover:bg-gray-800 hover:text-white transition">
          <i class="fa-solid fa-clock-rotate-left text-lg text-gray-400"></i>
          <span>Bet History</span>
        </a>
      </nav>
    </div>

    <!-- Bottom Logout Section -->
    <div class="pt-4 border-t border-gray-800">
      <button 
        id="logout-btn" 
        class="w-full bg-red-600/10 hover:bg-red-600 text-red-500 hover:text-white text-sm font-semibold px-4 py-3 rounded-xl transition flex items-center gap-3 cursor-pointer"
      >
        <i class="fa-solid fa-right-from-bracket text-lg"></i> Logout
      </button>
    </div>
  </aside>

  <!-- Main Content Wrapper -->
  <div class="flex-1 md:ml-64 flex flex-col min-h-screen">

    <!-- Top Header -->
    <header class="bg-white border-b border-gray-200 px-6 md:px-8 py-4 flex justify-between items-center shadow-sm sticky top-0 z-20">
      <div class="flex items-center gap-3">
        <button id="sidebar-open-btn" class="md:hidden text-gray-700 hover:text-purple-600 text-xl p-1 focus:outline-none cursor-pointer">
          <i class="fa-solid fa-bars"></i>
        </button>
        <h1 class="text-lg md:text-xl font-bold text-gray-800">🤖 AI Matches Panel</h1>
      </div>
      <div class="flex items-center gap-4">
        <span id="admin-status" class="text-xs bg-purple-500/10 text-purple-600 px-3 py-1.5 rounded-full border border-purple-500/20 font-semibold flex items-center">
          <i class="fa-solid fa-circle text-[8px] mr-1.5 text-purple-600 animate-pulse"></i> Admin Active
        </span>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 p-4 md:p-8 max-w-6xl w-full mx-auto">
      
      <!-- Action Bar -->
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
        <div>
          <h2 class="text-xl font-bold text-gray-800">AI Matches & Odds</h2>
          <p class="text-xs text-gray-500">Real-time status and odds control for AI Virtual Matches</p>
        </div>
        
        <a href="addbet.html" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-xl text-xs sm:text-sm font-semibold shadow-md transition flex items-center gap-2">
          <i class="fa-solid fa-plus"></i> Add AI Match
        </a>
      </div>

      <!-- Live Matches Grid Container -->
      <div id="matches-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="col-span-full text-center py-12 bg-white rounded-2xl border border-gray-200">
          <i class="fa-solid fa-spinner fa-spin text-3xl text-purple-600 mb-3"></i>
          <p class="text-gray-500 font-medium text-sm">Loading AI Matches...</p>
        </div>
      </div>

    </main>
  </div>

  <!-- Firebase Scripts -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, get, child, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBzQaaXhTtiGpMjRMBUXZaCIrDRoNyEkU4",
      authDomain: "betx-904da.firebaseapp.com",
      databaseURL: "https://betx-904da-default-rtdb.firebaseio.com",
      projectId: "betx-904da",
      storageBucket: "betx-904da.firebasestorage.app",
      messagingSenderId: "1076536561200",
      appId: "1:1076536561200:web:87ddeee59d73ed3a08e7f5",
      measurementId: "G-ER5HGVL74K"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const sidebar = document.getElementById('sidebar');
    const sidebarOpenBtn = document.getElementById('sidebar-open-btn');
    const sidebarCloseBtn = document.getElementById('sidebar-close-btn');
    const sidebarOverlay = document.getElementById('sidebar-overlay');

    const toggleSidebar = () => {
      sidebar.classList.toggle('-translate-x-full');
      sidebarOverlay.classList.toggle('hidden');
    };

    sidebarOpenBtn.addEventListener('click', toggleSidebar);
    sidebarCloseBtn.addEventListener('click', toggleSidebar);
    sidebarOverlay.addEventListener('click', toggleSidebar);

    const logoutBtn = document.getElementById('logout-btn');
    const matchesContainer = document.getElementById('matches-container');

    let allMatchesData = {};
    let simulatedScores = {};

    const getRandomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

    function generateAITargetScore() {
      const rand = Math.random();
      if (rand < 0.15) return getRandomInt(120, 140);
      else if (rand < 0.85) return getRandomInt(160, 180);
      else return getRandomInt(230, 250);
    }

    // Database বা Local Storage থেকে পূর্বে সংরক্ষিত স্কোর ডাটা পাওয়ার বা নতুন করে তৈরি করার ফাংশন
    function getAIScoreData(matchId, team1Name, team2Name, dbScore) {
      if (!simulatedScores[matchId]) {
        if (dbScore) {
          // ডাটাবেসে স্কোর থাকলে সেটি লোড হবে
          simulatedScores[matchId] = dbScore;
        } else {
          // ডাটাবেসে স্কোর না থাকলে নতুন স্কোর শুরু হবে
          simulatedScores[matchId] = {
            innings: 1,
            battingTeam: team1Name || 'TM1',
            bowlingTeam: team2Name || 'TM2',
            runs: 0,
            wickets: 0,
            over: 0,
            ball: 0,
            recentBalls: [],
            target: 0,
            isMatchOver: false
          };
        }
      }
      return simulatedScores[matchId];
    }

    // ১ বল আপডেট করা এবং সাথে সাথে ফায়ারবেস ডাটাবেসে পুশ করা
    async function updateMatchStateByOneBall(matchId) {
      const s = simulatedScores[matchId];
      if (!s || s.isMatchOver) return;

      const rand = Math.random();
      let event = '0';
      if (rand < 0.35) event = '0';
      else if (rand < 0.65) event = '1';
      else if (rand < 0.78) event = '2';
      else if (rand < 0.88) event = '4';
      else if (rand < 0.94) event = '6';
      else if (rand < 0.97) event = 'wd';
      else event = 'W';

      if (event === 'wd') {
        s.runs += 1;
      } else if (event === 'W') {
        s.wickets += 1;
        s.ball += 1;
      } else {
        s.runs += parseInt(event);
        s.ball += 1;
      }

      s.recentBalls.push(event);
      if (s.recentBalls.length > 6) s.recentBalls.shift();

      if (s.ball >= 6) {
        s.over += 1;
        s.ball = 0;
      }

      if (s.innings === 1) {
        if (s.over >= 20 || s.wickets >= 10) {
          s.target = s.runs + 1;
          if (s.target < 120) s.target = generateAITargetScore();
          s.innings = 2;
          
          const tempTeam = s.battingTeam;
          s.battingTeam = s.bowlingTeam; 
          s.bowlingTeam = tempTeam;

          s.runs = 0;
          s.wickets = 0;
          s.over = 0;
          s.ball = 0;
          s.recentBalls = [];
        }
      } else if (s.innings === 2) {
        if (s.runs >= s.target || s.over >= 20 || s.wickets >= 10) {
          s.isMatchOver = true;
        }
      }

      // 🔴 এখানে সরাসরি ফায়ারবেস ডাটাবেসে সেভ/আপডেট হচ্ছে 🔴
      try {
        await update(ref(db, `bets/${matchId}/aiScore`), s);
      } catch (e) {
        console.error("Score sync error:", e);
      }
    }

    const toEngNum = (num) => {
      if (num === undefined || num === null) return '';
      let str = String(num);
      const banglaNums = {'০':'0', '১':'1', '২':'2', '৩':'3', '৪':'4', '৫':'5', '৬':'6', '৭':'7', '৮':'8', '৯':'9'};
      str = str.replace(/[০-৯]/g, match => banglaNums[match]);
      str = str.replace(/[^0-9.]/g, '');
      return str;
    };

    const betsRef = ref(db, 'bets');
    onValue(betsRef, (snapshot) => {
      if (!snapshot.exists()) {
        allMatchesData = {};
        renderAIMatches();
        return;
      }
      allMatchesData = snapshot.val();
      
      Object.keys(allMatchesData).forEach(id => {
        const m = allMatchesData[id];
        if (m.category === 'AI Match') {
          const t1 = m.team1?.name?.substring(0, 3).toUpperCase() || 'TM1';
          const t2 = m.team2?.name?.substring(0, 3).toUpperCase() || 'TM2';
          getAIScoreData(id, t1, t2, m.aiScore);
        }
      });

      renderAIMatches();
    });

    function renderAIMatches() {
      matchesContainer.innerHTML = '';
      const keys = Object.keys(allMatchesData);
      
      const aiMatchKeys = keys.filter(id => allMatchesData[id].category === 'AI Match');

      if (aiMatchKeys.length === 0) {
        matchesContainer.innerHTML = `
          <div class="col-span-full text-center py-12 bg-white rounded-2xl border border-gray-200">
            <i class="fa-solid fa-robot text-4xl text-gray-300 mb-3"></i>
            <p class="text-gray-500 font-medium">No AI Matches found.</p>
          </div>
        `;
        return;
      }

      aiMatchKeys.forEach((matchId) => {
        renderMatchCard(matchId, allMatchesData[matchId]);
      });
    }

    function renderMatchCard(id, data) {
      const isLive = data.status === 'live';
      const statusBadgeClass = isLive 
        ? 'bg-red-500/10 text-red-500 border-red-500/20' 
        : data.status === 'finished' 
          ? 'bg-gray-500/10 text-gray-500 border-gray-500/20' 
          : 'bg-blue-500/10 text-blue-500 border-blue-500/20';

      const rawOdds = data.odds || {};
      const odds = {
        team1: toEngNum(rawOdds.team1 || '1.50'),
        team2: toEngNum(rawOdds.team2 || '1.50'),
        draw: toEngNum(rawOdds.draw || '2.00')
      };

      const t1 = data.team1?.name?.substring(0, 3).toUpperCase() || 'TM1';
      const t2 = data.team2?.name?.substring(0, 3).toUpperCase() || 'TM2';
      const aiScore = getAIScoreData(id, t1, t2, data.aiScore);

      const card = document.createElement('div');
      card.className = "bg-white rounded-2xl shadow-sm border border-gray-200 p-6 flex flex-col justify-between";
      
      card.innerHTML = `
        <div>
          <div class="flex justify-between items-center mb-4 pb-3 border-b border-gray-100 gap-2">
            <div class="flex items-center gap-1.5 flex-wrap">
              <span class="text-xs font-bold uppercase tracking-wider text-purple-600 bg-purple-50 px-2.5 py-1 rounded-lg">
                ${data.sport || 'Match'}
              </span>
              <span class="text-[10px] font-bold px-2 py-0.5 rounded-md border bg-purple-100 text-purple-600 border-purple-200">
                🤖 AI
              </span>
            </div>
            <span class="text-xs px-3 py-1 rounded-full border font-semibold capitalize ${statusBadgeClass}">
              ${data.status === 'live' ? '<i class="fa-solid fa-circle text-[8px] mr-1 animate-pulse"></i>' : ''} ${data.status}
            </span>
          </div>

          <p class="text-xs font-medium text-gray-400 mb-4">${data.league || 'AI Virtual League'}</p>

          <div class="flex items-center justify-between my-4 gap-2">
            <div class="flex flex-col items-center text-center w-1/3">
              <img src="${data.team1.logo}" alt="${data.team1.name}" class="w-12 h-12 object-contain mb-2 rounded-full bg-gray-50 p-1 border border-gray-100" onerror="this.src='https://via.placeholder.com/50?text=T1'">
              <span class="text-xs font-bold text-gray-800 line-clamp-1">${data.team1.name}</span>
            </div>

            <div class="text-center">
              <span class="text-xs font-black text-gray-300 bg-gray-100 px-2 py-1 rounded-md">VS</span>
            </div>

            <div class="flex flex-col items-center text-center w-1/3">
              <img src="${data.team2.logo}" alt="${data.team2.name}" class="w-12 h-12 object-contain mb-2 rounded-full bg-gray-50 p-1 border border-gray-100" onerror="this.src='https://via.placeholder.com/50?text=T2'">
              <span class="text-xs font-bold text-gray-800 line-clamp-1">${data.team2.name}</span>
            </div>
          </div>

          <!-- Dynamic Ball-By-Ball Real Cricket Scoreboard -->
          <div class="bg-gray-900 text-white p-3.5 rounded-xl my-3 shadow-inner">
            <div class="flex justify-between items-center border-b border-gray-800 pb-2 mb-2">
              <div class="flex items-center gap-2">
                <span class="inline-block w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                <span class="text-xs font-bold tracking-wider text-gray-200">${aiScore.battingTeam} ${aiScore.runs}/${aiScore.wickets}</span>
                <span class="text-[9px] bg-gray-800 text-gray-400 px-1.5 py-0.5 rounded font-mono">${aiScore.innings === 1 ? '1st Inn' : '2nd Inn'}</span>
              </div>
              <span class="text-[11px] font-semibold text-purple-400 bg-purple-950/80 px-2 py-0.5 rounded-md border border-purple-800/40 font-mono">
                ${aiScore.over}.${aiScore.ball} Ov
              </span>
            </div>
            <div class="flex flex-wrap items-center justify-between text-[11px] text-gray-300 gap-1.5">
              <div class="flex items-center gap-1 flex-wrap">
                <span class="font-medium text-gray-400">Over ${aiScore.over + 1}:</span>
                ${(aiScore.recentBalls || []).length === 0 ? '<span class="text-[10px] text-gray-500">Waiting for next ball...</span>' : ''}
                ${(aiScore.recentBalls || []).map(ball => {
                  let badgeStyle = "bg-gray-800 text-gray-200";
                  if (ball === '4') badgeStyle = "bg-blue-500/20 text-blue-300 font-bold";
                  if (ball === '6') badgeStyle = "bg-emerald-500/20 text-emerald-300 font-bold";
                  if (ball === 'wd') badgeStyle = "bg-amber-500/20 text-amber-300 font-bold";
                  if (ball === 'W') badgeStyle = "bg-red-500/20 text-red-400 font-bold";
                  return `<span class="${badgeStyle} px-1.5 py-0.5 rounded font-mono text-[10px]">${ball}</span>`;
                }).join('')}
              </div>
              <div class="text-xs font-bold text-amber-400 ml-auto font-mono">
                ${aiScore.innings === 2 ? `Target: ${aiScore.target}` : `1st Innings`}
              </div>
            </div>
          </div>

          <div class="text-center text-xs text-gray-500 my-3 bg-gray-50 py-2 rounded-lg">
            <i class="fa-regular fa-clock mr-1"></i> ${new Date(data.matchDate).toLocaleString('en-US')}
          </div>

          <div class="bg-purple-50/60 border border-purple-100 rounded-xl p-3 my-4">
            <div class="flex items-center justify-between mb-2">
              <span class="text-[11px] font-bold text-gray-700 flex items-center gap-1">
                <i class="fa-solid fa-chart-line text-purple-600"></i> Match Odds
              </span>
              <span class="text-[10px] text-gray-400">Multiplier (x)</span>
            </div>
            <p class="text-xs font-semibold mb-2">Team Wins 1X2</p> 
            <div class="grid grid-cols-3 gap-2">
              <div>
                <label class="block text-[9px] font-semibold text-gray-500 uppercase truncate">${data.team1.name}</label>
                <input type="text" inputmode="decimal" lang="en" data-id="${id}" data-type="team1" value="${odds.team1}" class="odds-input w-full px-2 py-1.5 text-xs font-bold text-gray-800 bg-white border border-gray-200 rounded-lg text-center focus:outline-none focus:ring-2 focus:ring-purple-500 font-sans">
              </div>

              <div>
                <label class="block text-[9px] font-semibold text-gray-500 uppercase truncate">Draw</label>
                <input type="text" inputmode="decimal" lang="en" data-id="${id}" data-type="draw" value="${odds.draw}" class="odds-input w-full px-2 py-1.5 text-xs font-bold text-gray-800 bg-white border border-gray-200 rounded-lg text-center focus:outline-none focus:ring-2 focus:ring-purple-500 font-sans">
              </div>

              <div>
                <label class="block text-[9px] font-semibold text-gray-500 uppercase truncate">${data.team2.name}</label>
                <input type="text" inputmode="decimal" lang="en" data-id="${id}" data-type="team2" value="${odds.team2}" class="odds-input w-full px-2 py-1.5 text-xs font-bold text-gray-800 bg-white border border-gray-200 rounded-lg text-center focus:outline-none focus:ring-2 focus:ring-purple-500 font-sans">
              </div>
            </div>
          </div>
        </div>

        <div class="pt-3 border-t border-gray-100 flex items-center justify-between gap-2">
          <div class="flex-1">
            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Status</label>
            <select data-id="${id}" class="status-select w-full px-2 py-1.5 text-xs font-medium bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500">
              <option value="upcoming" ${data.status === 'upcoming' ? 'selected' : ''}>Upcoming</option>
              <option value="live" ${data.status === 'live' ? 'selected' : ''}>Live Now</option>
              <option value="finished" ${data.status === 'finished' ? 'selected' : ''}>Finished</option>
            </select>
          </div>

          <div class="pt-4">
            <button data-id="${id}" class="delete-btn text-xs text-red-500 hover:bg-red-50 px-3 py-1.5 rounded-xl transition cursor-pointer flex items-center gap-1 font-semibold">
              <i class="fa-solid fa-trash-can"></i> Delete
            </button>
          </div>
        </div>
      `;

      matchesContainer.appendChild(card);
    }

    // Interval: প্রতি ৫ সেকেন্ড পর পর রান ডাটাবেসে সেভ ও আপডেট হবে
    setInterval(() => {
      Object.keys(simulatedScores).forEach(id => {
        updateMatchStateByOneBall(id);
      });
      if (Object.keys(allMatchesData).length > 0) {
        renderAIMatches();
      }
    }, 5000);

    matchesContainer.addEventListener('input', (e) => {
      if (e.target.classList.contains('odds-input')) {
        e.target.value = toEngNum(e.target.value);
      }
    });

    matchesContainer.addEventListener('change', async (e) => {
      if (e.target.classList.contains('status-select')) {
        const matchId = e.target.getAttribute('data-id');
        await update(ref(db, `bets/${matchId}`), { status: e.target.value });
      }

      if (e.target.classList.contains('odds-input')) {
        const matchId = e.target.getAttribute('data-id');
        const oddsType = e.target.getAttribute('data-type');
        await update(ref(db, `bets/${matchId}/odds`), { [oddsType]: toEngNum(e.target.value) });
      }
    });

    matchesContainer.addEventListener('click', async (e) => {
      const deleteBtn = e.target.closest('.delete-btn');
      if (deleteBtn && confirm('Are you sure you want to delete this match?')) {
        const matchId = deleteBtn.getAttribute('data-id');
        delete simulatedScores[matchId];
        await remove(ref(db, `bets/${matchId}`));
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const dbRef = ref(db);
        const userSnapshot = await get(child(dbRef, `users/${user.uid}`));
        if (!userSnapshot.exists() || userSnapshot.val().role !== "admin") {
          window.location.href = "login.html";
        }
      } else {
        window.location.href = "login.html";
      }
    });

    logoutBtn.addEventListener('click', () => {
      signOut(auth).then(() => window.location.href = "login.html");
    });
  </script>
</body>
</html>
