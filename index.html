<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firebase Login - Tailwind CSS</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <!-- Card Container -->
  <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-sm border border-gray-200">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Login</h2>
    
    <form id="login-form" class="space-y-4">
      <!-- Email Input -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-600 mb-1">Email</label>
        <input 
          type="email" 
          id="email" 
          required 
          placeholder="Enter your email" 
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:outline-none transition"
        >
      </div>

      <!-- Password Input -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-600 mb-1">Password</label>
        <input 
          type="password" 
          id="password" 
          required 
          placeholder="Enter your password" 
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:outline-none transition"
        >
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        id="btn-login" 
        class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-2.5 rounded-lg shadow transition duration-200"
      >
        Login
      </button>
    </form>

    <!-- Success/Error Message -->
    <div id="message" class="mt-4 text-center text-sm font-medium"></div>

    <!-- Sign Up Redirect Link -->
    <p class="mt-4 text-center text-sm text-gray-600">
      Don't have an account? 
      <a href="signup.html" class="text-orange-500 font-semibold hover:underline">Sign Up</a>
    </p>
  </div>

  <!-- Firebase Script -->
  <script type="module">
    // Firebase SDK v10 Import
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // আপনার Firebase Configuration (betx-904da)
    const firebaseConfig = {
      apiKey: "AIzaSyBzQaaXhTtiGpMjRMBUXZaCIrDRoNyEkU4",
      authDomain: "betx-904da.firebaseapp.com",
      databaseURL: "https://betx-904da-default-rtdb.firebaseio.com",
      projectId: "betx-904da",
      storageBucket: "betx-904da.firebasestorage.app",
      messagingSenderId: "1076536561200",
      appId: "1:1076536561200:web:87ddeee59d73ed3a08e7f5",
      measurementId: "G-ER5HGVL74K"
    };

    // Firebase Initialize
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // Form Handle
    const loginForm = document.getElementById('login-form');
    const messageDiv = document.getElementById('message');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        // ১. Firebase Auth দিয়ে ইউজার লগইন করা
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // ২. Realtime Database থেকে ইউজারের ডাটা আনো
        const dbRef = ref(db);
        const snapshot = await get(child(dbRef, `users/${user.uid}`));

        messageDiv.className = "mt-4 text-center text-sm font-medium text-green-600 bg-green-50 p-2 rounded-lg border border-green-200";
        messageDiv.innerText = `Login successful! Redirecting...`;
        loginForm.reset();

        // ৩. ডাটাবেজ চেক করে Admin নাকি User তা নির্ধারণ করে রিডাইরেক্ট করা
        setTimeout(() => {
          if (snapshot.exists()) {
            const userData = snapshot.val();
            
            if (userData.role === "admin") {
              // ইউজার অ্যাডমিন হলে admin.html এ পাঠাবে
              window.location.href = "admin.html";
            } else {
              // সাধারণ ইউজার হলে dashboard.html এ পাঠাবে
              window.location.href = "dashboard.html";
            }
          } else {
            // কোনো কারণে ডাটাবেজে ডাটা না পেলে ডিফল্ট ড্যাশবোর্ডে পাঠাবে
            window.location.href = "dashboard.html";
          }
        }, 1000);

      } catch (error) {
        // Error Message
        messageDiv.className = "mt-4 text-center text-sm font-medium text-red-600 bg-red-50 p-2 rounded-lg border border-red-200";
        
        if (error.code === 'auth/invalid-credential') {
          messageDiv.innerText = "Error: Invalid email or password!";
        } else {
          messageDiv.innerText = "Error: " + error.message;
        }
      }
    });
  </script>

</body>
</html>
