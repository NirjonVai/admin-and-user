<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - BetX</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col font-['Plus_Jakarta_Sans']">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm border-b border-gray-200 px-6 py-4 flex justify-between items-center">
    <div class="flex items-center space-x-2">
      <i class="fa-solid fa-chart-line text-orange-500 text-2xl"></i>
      <span class="text-xl font-bold text-gray-800">BetX Dashboard</span>
    </div>
    <button 
      id="logout-btn" 
      class="bg-red-500 hover:bg-red-600 text-white font-semibold px-4 py-2 rounded-lg text-sm transition flex items-center gap-2"
    >
      <i class="fa-solid fa-right-from-bracket"></i> Logout
    </button>
  </nav>

  <!-- Main Content -->
  <main class="flex-1 p-6 max-w-4xl mx-auto w-full">
    
    <!-- Welcome Banner -->
    <div class="bg-orange-500 text-white p-6 rounded-2xl shadow-lg mb-6">
      <h1 class="text-2xl md:text-3xl font-extrabold mb-1">
        Welcome Back, <span id="welcome-name">User</span>! 👋
      </h1>
      <p class="text-orange-100 text-sm">Have a great day managing your account.</p>
    </div>

    <!-- User Profile Details Card -->
    <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-200">
      <h2 class="text-lg font-bold text-gray-800 mb-4 pb-2 border-b border-gray-100 flex items-center gap-2">
        <i class="fa-solid fa-user-gear text-orange-500"></i> Account Profile Details
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <!-- Username -->
        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
          <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Username</p>
          <p id="user-name" class="text-base font-bold text-gray-800">Loading...</p>
        </div>

        <!-- Email -->
        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
          <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Email Address</p>
          <p id="user-email" class="text-base font-bold text-gray-800 break-words">Loading...</p>
        </div>

        <!-- Account Created Time -->
        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
          <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1">Account Created At</p>
          <p id="user-created" class="text-base font-bold text-gray-800">Loading...</p>
        </div>
      </div>
    </div>

  </main>

  <!-- Firebase Script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // আপনার Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBzQaaXhTtiGpMjRMBUXZaCIrDRoNyEkU4",
      authDomain: "betx-904da.firebaseapp.com",
      databaseURL: "https://betx-904da-default-rtdb.firebaseio.com",
      projectId: "betx-904da",
      storageBucket: "betx-904da.firebasestorage.app",
      messagingSenderId: "1076536561200",
      appId: "1:1076536561200:web:87ddeee59d73ed3a08e7f5",
      measurementId: "G-ER5HGVL74K"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // DOM Elements
    const welcomeName = document.getElementById('welcome-name');
    const userName = document.getElementById('user-name');
    const userEmail = document.getElementById('user-email');
    const userCreated = document.getElementById('user-created');
    const logoutBtn = document.getElementById('logout-btn');

    // Authentication Check
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // ইউজার লগইন অবস্থায় আছে
        const userId = user.uid;

        try {
          // Realtime Database থেকে ইউজারের তথ্য নিয়ে আসা
          const dbRef = ref(db);
          const snapshot = await get(child(dbRef, `users/${userId}`));

          if (snapshot.exists()) {
            const data = snapshot.val();
            
            welcomeName.innerText = data.username || "User";
            userName.innerText = data.username || "N/A";
            userEmail.innerText = data.email || user.email;
            userCreated.innerText = data.createdAt || "N/A";
          } else {
            // যদি ডাটাবেজে রেকর্ড না পাওয়া যায়, শুধু Auth-এর ডাটা দেখাবে
            welcomeName.innerText = user.displayName || "User";
            userName.innerText = user.displayName || "N/A";
            userEmail.innerText = user.email;
            userCreated.innerText = "N/A";
          }
        } catch (error) {
          console.error("Error fetching user data:", error);
        }

      } else {
        // ইউজার লগইন ছাড়া প্রবেশ করতে চাইলে Login পেজে পাঠাবে
        window.location.href = "4.html";
      }
    });

    // Logout Functionality
    logoutBtn.addEventListener('click', () => {
      signOut(auth).then(() => {
        window.location.href = "4.html";
      }).catch((error) => {
        alert("Logout Error: " + error.message);
      });
    });
  </script>

</body>
</html>
