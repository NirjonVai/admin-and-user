    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBzQaaXhTtiGpMjRMBUXZaCIrDRoNyEkU4",
            authDomain: "betx-904da.firebaseapp.com",
            databaseURL: "https://betx-904da-default-rtdb.firebaseio.com",
            projectId: "betx-904da",
            storageBucket: "betx-904da.firebasestorage.app",
            messagingSenderId: "1076536561200",
            appId: "1:1076536561200:web:87ddeee59d73ed3a08e7f5",
            measurementId: "G-ER5HGVL74K"
        };

        // Firebase Initialize
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const userNameDisplay = document.getElementById('user-display-name');
        const btnLogout = document.getElementById('btn-logout');

        // Check Login State
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    // Realtime Database থেকে ইউজারের তথ্য নিয়ে আসা
                    const dbRef = ref(db);
                    const snapshot = await get(child(dbRef, `users/${user.uid}`));
                    
                    if (snapshot.exists()) {
                        const userData = snapshot.val();
                        // ডাটাবেজে username থাকলে তা দেখাবে, না থাকলে নাম বা ইমেইল দেখাবে
                        userNameDisplay.innerText = userData.username || userData.name || user.email.split('@')[0];
                    } else {
                        userNameDisplay.innerText = user.email.split('@')[0];
                    }
                } catch (error) {
                    console.error("Error fetching user data:", error);
                    userNameDisplay.innerText = user.email ? user.email.split('@')[0] : "User";
                }
            } else {
                // ইউজার লগইন না থাকলে login.html-এ রিডাইরেক্ট করবে
                window.location.href = "login.html";
            }
        });

        // Logout Handle
        btnLogout.addEventListener('click', async () => {
            try {
                await signOut(auth);
                window.location.href = "login.html";
            } catch (error) {
                alert("Error logging out: " + error.message);
            }
        });
    </script>
