<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetX - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen selection:bg-amber-400 selection:text-slate-950 pb-20 lg:pb-0">

    <!-- Header -->
    <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800/80 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3.5 flex justify-between items-center">
            <div class="flex items-center space-x-2 group cursor-pointer">
                <span class="text-xl font-black tracking-widest text-white">BET<span class="text-amber-400 bg-gradient-to-r from-yellow-400 to-amber-300 bg-clip-text text-transparent">X</span></span>
            </div>

            <div class="flex items-center space-x-3 sm:space-x-4">
                <!-- User Profile Display -->
                <div class="flex items-center space-x-2 bg-slate-800/40 border border-slate-700/60 px-3 py-1.5 rounded-xl text-xs sm:text-sm font-semibold text-slate-200">
                    <i class="fa-solid fa-user-circle text-amber-400 text-sm sm:text-base"></i>
                    <span id="user-display-name" class="max-w-[100px] sm:max-w-[150px] truncate">Loading...</span>
                </div>

                <!-- Balance Box -->
                <div class="bg-slate-800/40 backdrop-blur-sm px-3 py-1.5 sm:px-4 sm:py-2 rounded-xl flex items-center space-x-2 sm:space-x-3 border border-slate-700/60 shadow-inner">
                    <span class="text-xs sm:text-sm font-extrabold text-amber-400 tracking-wide">৳500.00</span>
                    <button class="w-5 h-5 sm:w-6 sm:h-6 rounded-lg bg-amber-400/10 hover:bg-amber-400/20 text-amber-400 flex items-center justify-center transition-colors cursor-pointer">
                        <i class="fa-solid fa-plus text-xs"></i>
                    </button>
                </div>

                <!-- Logout Button -->
                <button id="btn-logout" title="Logout" class="bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 hover:border-red-500/40 p-2 sm:px-3 sm:py-2 rounded-xl flex items-center space-x-1.5 transition cursor-pointer text-xs sm:text-sm font-medium">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span class="hidden sm:inline">Logout</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="max-w-7xl mx-auto px-4 py-6 md:py-8 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <!-- Sidebar -->
        <aside class="lg:col-span-1 space-y-3">
            <h3 class="text-xs font-bold uppercase text-slate-500 tracking-widest px-1 flex items-center justify-between">
                <span>Top Sports</span>
                <i class="fa-solid fa-fire text-amber-400 text-xs"></i>
            </h3>
            
            <div class="flex flex-row lg:flex-col gap-2">
                <!-- All Matches Filter Button -->
                <button id="filter-all" class="flex-1 flex items-center justify-between bg-gradient-to-b from-slate-900 to-amber-950/20 hover:from-slate-800/80 p-2 rounded-xl border border-amber-500/10 group text-white cursor-pointer transition">
                    <span class="flex items-center space-x-2">
                        <div class="w-7 h-7 rounded-lg bg-amber-400/10 flex items-center justify-center">
                            <i class="fa-solid fa-list text-amber-400 text-xs"></i>
                        </div>
                        <span class="font-bold text-xs tracking-wide">All Events</span>
                    </span>
                    <span id="count-all" class="bg-amber-400/10 text-amber-400 text-[10px] font-black px-1.5 py-0.5 rounded-md border border-amber-400/20">0</span>
                </button>

                <!-- Football Filter Button -->
                <button id="filter-football" class="flex-1 flex items-center justify-between bg-gradient-to-b from-slate-900 to-amber-950/20 hover:from-slate-800/80 p-2 rounded-xl border border-amber-500/10 group text-white cursor-pointer transition">
                    <span class="flex items-center space-x-2">
                        <div class="w-7 h-7 rounded-lg bg-amber-400/10 flex items-center justify-center">
                            <i class="fa-solid fa-futbol text-amber-400 text-xs"></i>
                        </div>
                        <span class="font-bold text-xs tracking-wide">Football</span>
                    </span>
                    <span id="count-football" class="bg-amber-400/10 text-amber-400 text-[10px] font-black px-1.5 py-0.5 rounded-md border border-amber-400/20">0</span>
                </button>

                <!-- Cricket Filter Button -->
                <button id="filter-cricket" class="flex-1 flex items-center justify-between bg-gradient-to-b from-slate-900 to-amber-950/20 hover:from-slate-800/80 p-2 rounded-xl border border-amber-500/10 group text-white cursor-pointer transition">
                    <span class="flex items-center space-x-2">
                        <div class="w-7 h-7 rounded-lg bg-amber-400/10 flex items-center justify-center">
                            <i class="fa-solid fa-baseball-bat-ball text-amber-400 text-xs"></i>
                        </div>
                        <span class="font-bold text-xs tracking-wide">Cricket</span>
                    </span>
                    <span id="count-cricket" class="bg-amber-400/10 text-amber-400 text-[10px] font-black px-1.5 py-0.5 rounded-md border border-amber-400/20">0</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="lg:col-span-2 space-y-1">
            <div>
                <div class="flex justify-between items-center mb-4 px-1">
                    <h2 class="text-xs sm:text-sm font-black tracking-widest text-slate-200 flex items-center space-x-2">
                        <span class="w-2 h-2 bg-amber-400 rounded-full animate-ping absolute inline-flex"></span>
                        <span class="w-2 h-2 bg-amber-400 rounded-full relative"></span>
                        <span id="section-title">TOP LIVE EVENTS</span>
                    </h2>
                </div>

                <!-- Matches Dynamic Container -->
                <div id="matches-container" class="space-y-4">
                    <!-- Loading Skeleton / Message -->
                    <div class="text-center py-10 text-slate-500 font-semibold text-sm">
                        <i class="fa-solid fa-circle-notch animate-spin text-amber-400 text-2xl mb-2"></i>
                        <p>Loading live matches...</p>
                    </div>
                </div>
            </div>
        </main>

    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="lg:hidden fixed bottom-0 left-0 right-0 bg-slate-900/90 backdrop-blur-xl border-t border-slate-800/80 px-2 py-2 z-50 flex justify-around items-center shadow-2xl rounded-t-2xl">
        <a href="#" class="flex flex-col items-center justify-center text-amber-400 px-3 py-1 rounded-xl transition-all">
            <i class="fa-solid fa-fire text-lg mb-1"></i>
            <span class="text-[10px] font-bold tracking-wide">Popular</span>
        </a>
        <a href="#" class="flex flex-col items-center justify-center text-slate-400 hover:text-slate-200 px-3 py-1 rounded-xl transition-all relative">
            <i class="fa-solid fa-star text-lg mb-1"></i>
            <span class="text-[10px] font-medium tracking-wide">Favorite</span>
        </a>
        <a href="#" class="flex flex-col items-center justify-center text-slate-400 hover:text-slate-200 px-3 py-1 rounded-xl transition-all relative">
            <span class="absolute -top-1 bg-gradient-to-r from-amber-400 to-yellow-300 text-slate-950 font-black text-[9px] px-1.5 py-0.5 rounded-full border border-slate-900 scale-90">1</span>
            <i class="fa-solid fa-receipt text-lg mb-1"></i>
            <span class="text-[10px] font-medium tracking-wide">Bet Slip</span>
        </a>
        <a href="#" class="flex flex-col items-center justify-center text-slate-400 hover:text-slate-200 px-3 py-1 rounded-xl transition-all">
            <i class="fa-solid fa-history text-lg mb-1"></i>
            <span class="text-[10px] font-medium tracking-wide">History</span>
        </a>
        <a href="#" class="flex flex-col items-center justify-center text-slate-400 hover:text-slate-200 px-3 py-1 rounded-xl transition-all">
            <i class="fa-solid fa-bars text-lg mb-1"></i>
            <span class="text-[10px] font-medium tracking-wide">Menu</span>
        </a>
    </nav>

    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, get, child, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBzQaaXhTtiGpMjRMBUXZaCIrDRoNyEkU4",
            authDomain: "betx-904da.firebaseapp.com",
            databaseURL: "https://betx-904da-default-rtdb.firebaseio.com",
            projectId: "betx-904da",
            storageBucket: "betx-904da.firebasestorage.app",
            messagingSenderId: "1076536561200",
            appId: "1:1076536561200:web:87ddeee59d73ed3a08e7f5",
            measurementId: "G-ER5HGVL74K"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const userNameDisplay = document.getElementById('user-display-name');
        const btnLogout = document.getElementById('btn-logout');
        const matchesContainer = document.getElementById('matches-container');

        let allMatchesData = []; // Store all fetched matches

        // 1. Authentication Check
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const dbRef = ref(db);
                    const snapshot = await get(child(dbRef, `users/${user.uid}`));
                    if (snapshot.exists()) {
                        const userData = snapshot.val();
                        userNameDisplay.innerText = userData.username || userData.name || user.email.split('@')[0];
                    } else {
                        userNameDisplay.innerText = user.email.split('@')[0];
                    }
                } catch (error) {
                    userNameDisplay.innerText = user.email ? user.email.split('@')[0] : "User";
                }
            } else {
                window.location.href = "login.html";
            }
        });

        // 2. Logout Action
        btnLogout.addEventListener('click', async () => {
            try {
                await signOut(auth);
                window.location.href = "login.html";
            } catch (error) {
                alert("Error logging out: " + error.message);
            }
        });

        // 3. Fetch Matches from Realtime Database (`/bets`)
        const betsRef = ref(db, 'bets');
        onValue(betsRef, (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                allMatchesData = Object.keys(data).map(key => ({
                    id: key,
                    ...data[key]
                }));
                
                updateCounters(allMatchesData);
                renderMatches(allMatchesData);
            } else {
                matchesContainer.innerHTML = `<div class="text-center py-10 text-slate-500 font-semibold text-sm">No live events found.</div>`;
            }
        });

        // Helper: Date & Time Formatter
        function parseMatchDate(dateString) {
            if(!dateString) return { day: '--', month: '---', time: '--:--' };
            const d = new Date(dateString);
            const day = d.getDate();
            const month = d.toLocaleString('en-US', { month: 'short' });
            const time = d.toLocaleString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
            return { day, month, time };
        }

        // 4. Render Matches Function
        function renderMatches(matches) {
            if (matches.length === 0) {
                matchesContainer.innerHTML = `<div class="text-center py-10 text-slate-500 font-semibold text-sm">No matches available in this category.</div>`;
                return;
            }

            matchesContainer.innerHTML = matches.map(match => {
                const isFootball = match.sport?.toLowerCase() === 'football';
                const sportIcon = isFootball ? 'fa-futbol' : 'fa-baseball-bat-ball';
                const { day, month, time } = parseMatchDate(match.matchDate);
                const isLive = match.status === 'upcoming' || match.status === 'live';

                return `
                    <div class="rounded-xl p-2 md:p-4 border border-slate-600/80 shadow-2xl relative overflow-hidden group max-w-md mx-auto lg:mx-0 bg-slate-900/90 border-slate-700">
                        ${isLive ? `
                        <div class="absolute top-0 right-0 bg-amber-400 text-slate-950 font-black px-4 uppercase text-[7px] tracking-wider translate-x-4 translate-y-1.5 rotate-45 flex items-center justify-center shadow-md z-10">
                            <span class="w-1 h-1 bg-slate-950 rounded-full mr-1 animate-pulse"></span> ${match.status}
                        </div>` : ''}
                        
                        <div class="flex items-center space-x-1.5 text-slate-200 text-[11px] md:text-xs font-bold tracking-wide mb-3 drop-shadow-md">
                            <i class="fa-solid ${sportIcon} text-amber-400 text-[11px]"></i>
                            <span class="uppercase">${match.league || 'Tournament'}</span>
                            <span class="text-slate-400 font-bold text-[11px]">• &nbsp;${time}</span>
                        </div>

                        <div class="flex items-center justify-start">
                            <div class="pr-3 flex flex-col items-center justify-center min-w-[40px] md:min-w-[48px] drop-shadow-md self-center">
                                <span class="text-xl md:text-2xl font-extrabold text-slate-200 leading-none">${day}</span>
                                <span class="text-[10px] font-bold text-amber-400 mt-0.5 uppercase">${month}</span>
                            </div>

                            <div class="h-12 w-[2px] bg-slate-700 shadow-[0_0_8px_rgba(255,255,255,0.1)] self-center"></div>

                            <div class="flex-1 flex items-center justify-around pl-3 md:pl-4">
                                <!-- Team 1 -->
                                <div class="flex flex-col items-center text-center w-5/12 drop-shadow-[0_2px_3px_rgba(0,0,0,0.8)]">
                                    <div class="w-10 h-10 md:w-12 md:h-12 bg-white rounded-full flex items-center justify-center shadow-md border border-slate-700/30 overflow-hidden p-1">
                                        <img src="${match.team1?.logo || 'https://via.placeholder.com/50'}" alt="${match.team1?.name}" class="w-full h-full object-contain">
                                    </div>
                                    <p class="font-extrabold text-[11px] md:text-xs tracking-wide text-white mt-2 line-clamp-1">${match.team1?.name || 'Team A'}</p>
                                </div>

                                <span class="text-amber-400 font-black italic text-xl tracking-tighter drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] mx-2 mb-5">
                                    Vs
                                </span>

                                <!-- Team 2 -->
                                <div class="flex flex-col items-center text-center w-5/12 drop-shadow-[0_2px_3px_rgba(0,0,0,0.8)]">
                                    <div class="w-10 h-10 md:w-12 md:h-12 bg-white rounded-full flex items-center justify-center shadow-md border border-slate-700/30 overflow-hidden p-1">
                                        <img src="${match.team2?.logo || 'https://via.placeholder.com/50'}" alt="${match.team2?.name}" class="w-full h-full object-contain">
                                    </div>
                                    <p class="font-extrabold text-[11px] md:text-xs tracking-wide text-white mt-2 line-clamp-1">${match.team2?.name || 'Team B'}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 5. Update Side Counters
        function updateCounters(matches) {
            document.getElementById('count-all').innerText = matches.length;
            document.getElementById('count-football').innerText = matches.filter(m => m.sport?.toLowerCase() === 'football').length;
            document.getElementById('count-cricket').innerText = matches.filter(m => m.sport?.toLowerCase() === 'cricket').length;
        }

        // 6. Filter Handlers
        document.getElementById('filter-all').addEventListener('click', () => {
            renderMatches(allMatchesData);
            document.getElementById('section-title').innerText = "TOP LIVE EVENTS";
        });

        document.getElementById('filter-football').addEventListener('click', () => {
            const fb = allMatchesData.filter(m => m.sport?.toLowerCase() === 'football');
            renderMatches(fb);
            document.getElementById('section-title').innerText = "FOOTBALL EVENTS";
        });

        document.getElementById('filter-cricket').addEventListener('click', () => {
            const ck = allMatchesData.filter(m => m.sport?.toLowerCase() === 'cricket');
            renderMatches(ck);
            document.getElementById('section-title').innerText = "CRICKET EVENTS";
        });
    </script>

</body>
    </html>
